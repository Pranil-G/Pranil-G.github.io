<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Bridge PoC</title></head>
<body>
<h1>BridgePoC</h1>
<pre id="out"></pre>
<script>
function log(msg) {
    const o = document.getElementById('out');
    o.textContent += msg + '\n';
}

function tryCall(name, fn) {
    try {
        const v = fn();
        log(name + ': ' + JSON.stringify(v));
    } catch (e) {
        log(name + ' error: ' + e);
    }
}

if (typeof BridgeCommonApi !== 'undefined') {
    log('BridgeCommonApi available');
    tryCall('getToken', () => BridgeCommonApi.getToken());
    tryCall('getClipboardText', () => BridgeCommonApi.getClipboardText());
    tryCall('getDeviceInfo', () => BridgeCommonApi.getDeviceInfo());
    tryCall('getAppInfo', () => BridgeCommonApi.getAppInfo());
    tryCall('isLogin', () => BridgeCommonApi.isLogin());
    tryCall('vibrate', () => BridgeCommonApi.vibrate(50));

    // showDialog check
    try {
        const dialogModel = {
            title: 'PoC',
            message: 'BridgeCommonApi.showDialog test',
            positiveText: 'OK',
            negativeText: 'Cancel'
        };
        const callback = {
            onProgress: function(msg){ log('showDialog progress: ' + msg); },
            onCompleted: function(result){ log('showDialog completed: ' + JSON.stringify(result)); },
            onRemove: function(){ log('showDialog removed'); }
        };
        BridgeCommonApi.showDialog(dialogModel, callback);
        log('showDialog invoked');
    } catch (e) {
        log('showDialog error: ' + e);
    }
} else {
    log('BridgeCommonApi NOT available');
}
</script>
</body>
</html>
